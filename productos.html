<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Productos - RentEZ</title>
    <link rel="stylesheet" href="../css/estilos.css" />
</head>
<body>
    <header class="menu-fijo">
        <div class="contenedor-menu">
            <a href="../index.html" class="logo">
                <img src="../assets/logo.svg" alt="Logo RentEZ" height="50" width="70" />
            </a>
            <nav class="enlaces">
                <a href="../index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="equipo.html">Equipo</a>
            </nav>
        </div>
    </header>

    <section id="productos-rent-ez" class="contenedor-productos">
        <h2 class="titulo-seccion">AVAILABLE FOR RENT</h2>
        <div class="grid-productos">
            
            <div class="tarjeta">
                <div class="contenedor-img-producto">
                    <img src="assets/badminton.jpg" alt="Badminton Set">
                </div>
                <div class="info-card">
                    <h3>SET INICIACIÓN BADMINTON</h3>
                    <p class="precio-azul">5€ / dia</p>
                    <p class="ubicacion">📍 Madrid, España</p>
                    <p class="usuario">👤 robert smith</p>
                    <a href="#" class="boton-alquiler">Alquilar ahora</a>
                </div>
            </div>

            <div class="tarjeta">
                <div class="contenedor-img-producto">
                    <img src="../assets/kayak.png" alt="Kayak">
                </div>
                <div class="info-card">
                    <h3>KAYAK INDIVIDUAL</h3>
                    <p class="precio-azul">15€ / day</p>
                    <p class="ubicacion">📍 Istambul, Sisli</p>
                    <p class="usuario">👤 robert smith</p>
                    <a href="#" class="boton-alquiler">Alquilar ahora</a>
                </div>
            </div>

        </div>
    </section>
</body>
</html>
