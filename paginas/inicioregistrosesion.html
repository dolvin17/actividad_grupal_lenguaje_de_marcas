<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso usuario</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

    <section class="contenedor-acceso">
        <h2 class="titulo-seccion">ACCESO USUARIOS</h2>

        <div class="grid-acceso">
            
            <div class="tarjeta acceso invertida neon-azul">
                <div class="header-blanco">
                    <img src="../assets/inciarsesion.png" alt="Login" class="icono-tech">
                </div>
                <div class="cuerpo-negro">
                    <h3>Iniciar Sesión</h3>
                    <form class="form-acceso">
                        <div class="grupo-input">
                            <label>Email</label>
                            <input type="email" placeholder="ejemplo@correo.com">
                        </div>
                        <div class="grupo-input">
                            <label>Contraseña</label>
                            <input type="password" placeholder="••••••••">
                        </div>
                        <button type="submit" class="boton-blanco">Entrar</button>
                    </form>
                </div>
            </div>

            <div class="tarjeta acceso invertida neon-rosa">
                <div class="header-blanco">
                    <img src="../assets/nueva cuenta.png" alt="Registro" class="icono-tech">
                </div>
                <div class="cuerpo-negro">
                    <h3>Crear Cuenta</h3>
                    <form class="form-acceso">
                        <div class="grupo-input">
                            <label>Nombre</label>
                            <input type="text" placeholder="Tu nombre">
                        </div>
                        <div class="grupo-input">
                            <label>Email</label>
                            <input type="email" placeholder="ejemplo@correo.com">
                        </div>
                        <div class="grupo-input">
                            <label>Contraseña</label>
                            <input type="password" placeholder="Mínimo 8 caracteres">
                        </div>
                        <button type="submit" class="boton-blanco">Registrarme</button>
                    </form>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
